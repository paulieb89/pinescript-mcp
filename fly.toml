# fly.toml app configuration file generated for pinescript-mcp on 2026-02-13T13:24:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pinescript-mcp'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
