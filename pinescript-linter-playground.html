<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Script v6 Linter Playground</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-panel: #161b22;
    --bg-hover: #1c2128;
    --bg-input: #0d1117;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --error: #f85149;
    --error-bg: rgba(248, 81, 73, 0.1);
    --warning: #d29922;
    --warning-bg: rgba(210, 153, 34, 0.1);
    --ok: #3fb950;
    --ok-bg: rgba(63, 185, 80, 0.1);
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header h1 .version {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 400;
    padding: 2px 6px;
    background: var(--bg);
    border-radius: 4px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 500;
  }

  .status-badge.ok { background: var(--ok-bg); color: var(--ok); }
  .status-badge.issues { background: var(--error-bg); color: var(--error); }
  .status-badge.warnings { background: var(--warning-bg); color: var(--warning); }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .preset-btn {
    display: block;
    width: 100%;
    padding: 6px 8px;
    margin-bottom: 4px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }

  .preset-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
  .preset-btn.active { background: rgba(88, 166, 255, 0.1); border-color: var(--accent); color: var(--accent); }

  .rule-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    font-size: 11px;
    color: var(--text-dim);
  }

  .rule-toggle input[type="checkbox"] {
    accent-color: var(--accent);
  }

  .rule-toggle .rule-id {
    font-family: var(--mono);
    font-size: 10px;
  }

  .rule-toggle .error-rule { color: var(--error); }
  .rule-toggle .warning-rule { color: var(--warning); }

  /* Editor area */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .editor-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .editor-toolbar .tab {
    font-size: 12px;
    color: var(--text-dim);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: var(--mono);
  }

  .editor-toolbar .tab.active {
    color: var(--text);
    background: var(--bg);
  }

  .editor-wrapper {
    flex: 1;
    display: flex;
    position: relative;
    min-height: 0;
  }

  .line-numbers {
    width: 44px;
    padding: 12px 8px 12px 4px;
    background: var(--bg-panel);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 20px;
    text-align: right;
    user-select: none;
    overflow: hidden;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
  }

  .line-numbers .ln {
    height: 20px;
    display: block;
  }

  .line-numbers .ln.has-error { color: var(--error); font-weight: 600; }
  .line-numbers .ln.has-warning { color: var(--warning); font-weight: 600; }

  #editor {
    flex: 1;
    background: var(--bg-input);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 20px;
    padding: 12px;
    border: none;
    outline: none;
    resize: none;
    tab-size: 4;
    white-space: pre;
    overflow-wrap: normal;
    overflow-x: auto;
  }

  #editor::placeholder { color: var(--text-muted); }

  /* Results panel */
  .results-panel {
    width: 340px;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .results-header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .results-header .counts {
    display: flex;
    gap: 10px;
    font-size: 11px;
    font-weight: 400;
  }

  .results-header .count-errors { color: var(--error); }
  .results-header .count-warnings { color: var(--warning); }

  .results-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .result-item {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  .result-item:hover { background: var(--bg-hover); }

  .result-item .result-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .result-item .severity-icon {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .severity-icon.error { background: var(--error); color: #fff; }
  .severity-icon.warning { background: var(--warning); color: #fff; }

  .result-item .rule-name {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  .result-item .line-ref {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    margin-left: auto;
  }

  .result-item .message {
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
  }

  .no-issues {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 8px;
  }

  .no-issues .check {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--ok-bg);
    color: var(--ok);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  /* Prompt bar */
  .prompt-bar {
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    max-height: 200px;
    display: flex;
    flex-direction: column;
  }

  .prompt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
  }

  .prompt-header span {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .prompt-actions {
    display: flex;
    gap: 6px;
  }

  .btn-sm {
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-sm:hover { background: var(--bg-hover); border-color: var(--accent); }
  .btn-sm.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-sm.primary:hover { opacity: 0.9; }

  .prompt-content {
    padding: 0 16px 10px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-dim);
    line-height: 1.5;
    overflow-y: auto;
    white-space: pre-wrap;
    max-height: 140px;
  }

  .copied-toast {
    position: fixed;
    bottom: 60px;
    right: 20px;
    background: var(--ok);
    color: #fff;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 100;
  }

  .copied-toast.show { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <h1>
    Pine Script v6 Linter
    <span class="version">17 rules</span>
  </h1>
  <div id="statusBadge" class="status-badge ok">
    <span class="status-dot"></span>
    <span id="statusText">No code</span>
  </div>
</div>

<div class="main">
  <!-- Sidebar: presets + rule toggles -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Presets</h3>
      <button class="preset-btn" onclick="loadPreset('clean')">Clean Script</button>
      <button class="preset-btn" onclick="loadPreset('v5_migration')">v5 Migration Errors</button>
      <button class="preset-btn" onclick="loadPreset('hallucinated')">Hallucinated Functions</button>
      <button class="preset-btn" onclick="loadPreset('strategy_bugs')">Strategy Bugs</button>
      <button class="preset-btn" onclick="loadPreset('input_enum')">input.enum() Pitfalls</button>
      <button class="preset-btn" onclick="loadPreset('kitchen_sink')">Kitchen Sink (all rules)</button>
    </div>
    <div class="sidebar-section" id="ruleToggles">
      <h3>Rules</h3>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-panel">
    <div class="editor-toolbar">
      <span class="tab active">script.pine</span>
      <span style="font-size:11px;color:var(--text-muted)" id="charCount">0 chars</span>
    </div>
    <div class="editor-wrapper">
      <div class="line-numbers" id="lineNumbers"></div>
      <textarea id="editor" spellcheck="false" placeholder="Paste Pine Script v6 code here..."></textarea>
    </div>
  </div>

  <!-- Results -->
  <div class="results-panel">
    <div class="results-header">
      <span>Issues</span>
      <div class="counts">
        <span class="count-errors" id="errorCount">0 errors</span>
        <span class="count-warnings" id="warningCount">0 warnings</span>
      </div>
    </div>
    <div class="results-list" id="resultsList"></div>
  </div>
</div>

<!-- Prompt output -->
<div class="prompt-bar">
  <div class="prompt-header" onclick="togglePrompt()">
    <span>Prompt Output</span>
    <div class="prompt-actions">
      <button class="btn-sm" onclick="event.stopPropagation(); togglePrompt();" id="toggleBtn">Expand</button>
      <button class="btn-sm primary" onclick="event.stopPropagation(); copyPrompt();">Copy</button>
    </div>
  </div>
  <div class="prompt-content" id="promptContent" style="display:none;"></div>
</div>

<div class="copied-toast" id="copiedToast">Copied!</div>

<script>
// ---------------------------------------------------------------------------
// Pine Script v6 function allowlist (subset for client-side validation)
// ---------------------------------------------------------------------------
const PINE_V6_NAMESPACES = new Set([
  "alert", "array", "bar_index", "box", "chart", "color", "dayofmonth",
  "dayofweek", "display", "earnings", "fill", "font", "format", "hline",
  "input", "label", "line", "linefill", "log", "map", "math", "matrix",
  "na", "polyline", "request", "runtime", "session", "str", "strategy",
  "syminfo", "ta", "table", "ticker", "time", "timeframe", "weekofyear",
]);

const PINE_V6_FUNCTIONS = new Set([
  // ta.*
  "ta.rsi", "ta.sma", "ta.ema", "ta.wma", "ta.vwma", "ta.swma", "ta.alma",
  "ta.macd", "ta.stoch", "ta.rma", "ta.atr", "ta.tr", "ta.bb", "ta.bbw",
  "ta.cci", "ta.cmo", "ta.cog", "ta.dmi", "ta.falling", "ta.rising",
  "ta.highest", "ta.highestbars", "ta.lowest", "ta.lowestbars",
  "ta.mfi", "ta.mom", "ta.percentile_linear_interpolation",
  "ta.percentile_nearest_rank", "ta.percentrank", "ta.pivothigh",
  "ta.pivotlow", "ta.range", "ta.roc", "ta.sar", "ta.supertrend",
  "ta.valuewhen", "ta.variance", "ta.vwap", "ta.wpr",
  "ta.crossover", "ta.crossunder", "ta.cum", "ta.change", "ta.dev",
  "ta.stdev", "ta.correlation", "ta.kc", "ta.kcw", "ta.linreg",
  "ta.median", "ta.mode", "ta.percentile",
  // strategy.*
  "strategy.entry", "strategy.exit", "strategy.close", "strategy.close_all",
  "strategy.cancel", "strategy.cancel_all", "strategy.order",
  "strategy.risk.allow_entry_in", "strategy.risk.max_cons_loss_days",
  "strategy.risk.max_drawdown", "strategy.risk.max_intraday_filled_orders",
  "strategy.risk.max_intraday_loss", "strategy.risk.max_position_size",
  // request.*
  "request.security", "request.security_lower_tf", "request.financial",
  "request.quandl", "request.dividends", "request.earnings",
  "request.splits", "request.seed", "request.currency_rate",
  // math.*
  "math.abs", "math.acos", "math.asin", "math.atan", "math.avg",
  "math.ceil", "math.cos", "math.exp", "math.floor", "math.log",
  "math.log10", "math.max", "math.min", "math.pow", "math.random",
  "math.round", "math.round_to_mintick", "math.sign", "math.sin",
  "math.sqrt", "math.sum", "math.tan", "math.todegrees", "math.toradians",
  // str.*
  "str.contains", "str.endswith", "str.format", "str.format_time",
  "str.length", "str.lower", "str.match", "str.pos", "str.repeat",
  "str.replace", "str.replace_all", "str.split", "str.startswith",
  "str.substring", "str.tonumber", "str.tostring", "str.upper",
  // array.*
  "array.avg", "array.binary_search", "array.binary_search_leftmost",
  "array.binary_search_rightmost", "array.clear", "array.concat",
  "array.copy", "array.covariance", "array.every", "array.fill",
  "array.first", "array.from", "array.get", "array.includes",
  "array.indexof", "array.insert", "array.join", "array.last",
  "array.lastindexof", "array.max", "array.median", "array.min",
  "array.mode", "array.new", "array.new_bool", "array.new_box",
  "array.new_color", "array.new_float", "array.new_int",
  "array.new_label", "array.new_line", "array.new_linefill",
  "array.new_string", "array.new_table", "array.percentile_linear_interpolation",
  "array.percentile_nearest_rank", "array.percentrank", "array.pop",
  "array.push", "array.range", "array.remove", "array.reverse",
  "array.set", "array.shift", "array.size", "array.slice", "array.some",
  "array.sort", "array.sort_indices", "array.standardize", "array.stdev",
  "array.sum", "array.unshift", "array.variance",
  // map.*
  "map.clear", "map.contains", "map.copy", "map.get", "map.keys",
  "map.new", "map.put", "map.put_all", "map.remove", "map.size",
  "map.values",
  // matrix.*
  "matrix.add_col", "matrix.add_row", "matrix.avg", "matrix.col",
  "matrix.columns", "matrix.concat", "matrix.copy", "matrix.det",
  "matrix.diff", "matrix.eigenvalues", "matrix.eigenvectors",
  "matrix.elements_count", "matrix.fill", "matrix.get",
  "matrix.inv", "matrix.is_antidiagonal", "matrix.is_antisymmetric",
  "matrix.is_binary", "matrix.is_diagonal", "matrix.is_identity",
  "matrix.is_square", "matrix.is_stochastic", "matrix.is_symmetric",
  "matrix.is_triangular", "matrix.is_zero", "matrix.kron",
  "matrix.max", "matrix.median", "matrix.min", "matrix.mode",
  "matrix.mult", "matrix.new", "matrix.pinv", "matrix.pow",
  "matrix.rank", "matrix.remove_col", "matrix.remove_row",
  "matrix.reshape", "matrix.reverse", "matrix.row", "matrix.rows",
  "matrix.set", "matrix.sort", "matrix.submatrix", "matrix.sum",
  "matrix.swap_columns", "matrix.swap_rows", "matrix.trace",
  "matrix.transpose",
  // input.*
  "input.bool", "input.color", "input.enum", "input.float", "input.int",
  "input.price", "input.session", "input.source", "input.string",
  "input.symbol", "input.text_area", "input.time", "input.timeframe",
  // color.*
  "color.b", "color.from_gradient", "color.g", "color.new",
  "color.r", "color.rgb",
  // label.*
  "label.copy", "label.delete", "label.get_text", "label.get_x",
  "label.get_y", "label.new", "label.set_color", "label.set_point",
  "label.set_size", "label.set_style", "label.set_text",
  "label.set_text_font_family", "label.set_textcolor",
  "label.set_textalign", "label.set_tooltip", "label.set_x",
  "label.set_xloc", "label.set_xy", "label.set_y", "label.set_yloc",
  // line.*
  "line.copy", "line.delete", "line.get_price", "line.get_x1",
  "line.get_x2", "line.get_y1", "line.get_y2", "line.new",
  "line.set_color", "line.set_extend", "line.set_first_point",
  "line.set_second_point", "line.set_style", "line.set_width",
  "line.set_x1", "line.set_x2", "line.set_xy1", "line.set_xy2",
  "line.set_xloc", "line.set_y1", "line.set_y2",
  // box.*
  "box.copy", "box.delete", "box.get_bottom", "box.get_left",
  "box.get_right", "box.get_top", "box.new", "box.set_bgcolor",

  "table.cell_set_text_font_family", "table.cell_set_text_halign",
  "table.cell_set_text_size", "table.cell_set_text_valign",
  "table.cell_set_tooltip", "table.cell_set_width", "table.clear",
  "table.delete", "table.merge_cells", "table.new",
  "table.set_bgcolor", "table.set_border_color",
  "table.set_border_width", "table.set_frame_color",
  "table.set_frame_width", "table.set_position",
  // log.*
  "log.error", "log.info", "log.warning",
  // runtime.*
  "runtime.error",
  // ticker.*
  "ticker.heikinashi", "ticker.kagi", "ticker.linebreak",
  "ticker.modify", "ticker.new", "ticker.pointfigure",
  "ticker.renko", "ticker.standard",
  // polyline.*
  "polyline.delete", "polyline.new",
  // linefill.*
  "linefill.delete", "linefill.new", "linefill.set_color",
  // fill (top-level but with dot-like usage)
  "chart.point.copy", "chart.point.from_index", "chart.point.from_time",
  "chart.point.new", "chart.point.now",
  // session
  "session.ismarket", "session.ispostmarket", "session.ispremarket",
  // timeframe
  "timeframe.change",
  // alert
  "alert.freq_once_per_bar", "alert.freq_once_per_bar_close", "alert.freq_all",
]);

const CONST_STRING_NAMESPACES = new Set([
  "adjustment", "alert.freq", "currency", "display", "earnings",
  "extend", "format", "hline.style", "label.style", "line.style",
  "location", "plot.style", "position", "scale", "session", "shape",
  "size", "strategy", "strategy.commission", "strategy.direction",
  "strategy.oca", "text", "xloc", "yloc",
]);

// ---------------------------------------------------------------------------
// Lint Rules (ported from server.py)
// ---------------------------------------------------------------------------

const RULES = {
  W001_missing_version:      { severity: "warning", desc: "Missing //@version=6 declaration" },
  E001_input_enum_const_string: { severity: "error", desc: "input.enum() with const string constants" },
  E003_return_type_keyword:  { severity: "error", desc: "Return type keyword on function declaration" },
  E005_study_removed:        { severity: "error", desc: "study() removed in v6" },
  E006_security_removed:     { severity: "error", desc: "security() removed in v6" },
  E007_alertcondition_in_strategy: { severity: "error", desc: "alertcondition() in strategy context" },
  E009_format_currency:      { severity: "error", desc: "format.currency doesn't exist" },
  E010_direct_na_comparison: { severity: "error", desc: "Direct comparison to na" },
  E012_unknown_function:     { severity: "error", desc: "Hallucinated function name" },
  E013_input_enum_options_array: { severity: "error", desc: "input.enum() with options array" },
  E014_strategy_missing_title: { severity: "error", desc: "strategy() without title" },
  E015_mismatched_quotes:    { severity: "error", desc: "Mismatched string quotes" },
  W003_lookahead_on:         { severity: "warning", desc: "lookahead_on without justification" },
  W004_high_max_bars_back:   { severity: "warning", desc: "Very high max_bars_back" },
  W005_potentially_unused_var: { severity: "warning", desc: "Potentially unused variable" },
};

// State
const state = {
  code: "",
  issues: [],
  enabledRules: new Set(Object.keys(RULES)),
  activePreset: null,
  promptExpanded: false,
};

// ---------------------------------------------------------------------------
// Lint engine
// ---------------------------------------------------------------------------

function lintPine(code) {
  const issues = [];
  const lines = code.split("\n");

  for (let i = 0; i < lines.length; i++) {
    const lineNum = i + 1;
    const stripped = lines[i].trim();

    if (!stripped || stripped.startsWith("//")) continue;

    // E001: input.enum() with const string constants
    if (state.enabledRules.has("E001_input_enum_const_string") && /input\.enum\s*\(/.test(stripped)) {
      for (const ns of CONST_STRING_NAMESPACES) {
        const re = new RegExp("\\b" + ns.replace(/\./g, "\\.") + "\\.", "");
        if (re.test(stripped)) {
          issues.push({
            line: lineNum, rule: "E001_input_enum_const_string",
            message: `input.enum() cannot be used with ${ns}.* constants (they are const string, not enum). Use input.string() with options=[...] instead.`,
            severity: "error"
          });
          break;
        }
      }
    }

    // E003: Return type keyword on function declaration
    if (state.enabledRules.has("E003_return_type_keyword")) {
      const funcDecl = stripped.match(/^(string|int|float|bool|color|table|line|box|label)\s+(\w+)\s*\(.*\)\s*=>/);
      if (funcDecl) {
        issues.push({
          line: lineNum, rule: "E003_return_type_keyword",
          message: `Cannot use '${funcDecl[1]}' as return type on function '${funcDecl[2]}()'. Remove the type keyword -- Pine v6 infers return types.`,
          severity: "error"
        });
      }
    }

    // E005: study() instead of indicator()
    if (state.enabledRules.has("E005_study_removed") && /\bstudy\s*\(/.test(stripped)) {
      issues.push({
        line: lineNum, rule: "E005_study_removed",
        message: "study() does not exist in Pine v6. Use indicator() instead.",
        severity: "error"
      });
    }

    // E006: security() instead of request.security()
    if (state.enabledRules.has("E006_security_removed") && /(?<!request\.)\bsecurity\s*\(/.test(stripped)) {
      issues.push({
        line: lineNum, rule: "E006_security_removed",
        message: "security() does not exist in v6. Use request.security() instead.",
        severity: "error"
      });
    }

    // E007: alertcondition() in strategy
    if (state.enabledRules.has("E007_alertcondition_in_strategy") && /\balertcondition\s*\(/.test(stripped)) {
      for (let k = 0; k < i; k++) {
        const prev = lines[k].trim();
        if (prev.startsWith("//")) continue;
        if (/\bstrategy\s*\(/.test(prev)) {
          issues.push({
            line: lineNum, rule: "E007_alertcondition_in_strategy",
            message: "alertcondition() only works in indicator() scripts. Strategies must use alert() with alert.freq_once_per_bar_close.",
            severity: "error"
          });
          break;
        }
      }
    }

    // E009: format.currency
    if (state.enabledRules.has("E009_format_currency") && /\bformat\.currency\b/.test(stripped)) {
      issues.push({
        line: lineNum, rule: "E009_format_currency",
        message: "format.currency does not exist in Pine v6. Use format.mintick or manual string formatting.",
        severity: "error"
      });
    }

    // E010: Direct comparison to na
    if (state.enabledRules.has("E010_direct_na_comparison")) {
      if (/[!=]=\s*\bna\s*($|[^a-zA-Z0-9_(])/.test(stripped) || /(?<![a-zA-Z0-9_])\bna\s*[!=]=/.test(stripped)) {
        issues.push({
          line: lineNum, rule: "E010_direct_na_comparison",
          message: "Cannot compare a value to 'na' directly. Use the na() function instead. E.g. `na(x)` not `x == na`.",
          severity: "error"
        });
      }
    }

    // E012: Hallucinated function
    if (state.enabledRules.has("E012_unknown_function")) {
      const fnRegex = /\b([a-z][a-z0-9]*(?:\.[a-z_][a-z0-9_]*)+)\s*\(/g;
      let match;
      while ((match = fnRegex.exec(stripped)) !== null) {
        const fnName = match[1];
        const parts = fnName.split(".");
        let ns = null;
        for (let depth = parts.length - 1; depth > 0; depth--) {
          const candidate = parts.slice(0, depth).join(".");
          if (PINE_V6_NAMESPACES.has(candidate)) {
            ns = candidate;
            break;
          }
        }
        if (ns && !PINE_V6_FUNCTIONS.has(fnName)) {
          issues.push({
            line: lineNum, rule: "E012_unknown_function",
            message: `'${fnName}()' does not exist in Pine Script v6.`,
            severity: "error"
          });
        }
      }
    }

    // E013: input.enum() with options array
    if (state.enabledRules.has("E013_input_enum_options_array") && /input\.enum\s*\([^)]*options\s*=\s*\[/.test(stripped)) {
      issues.push({
        line: lineNum, rule: "E013_input_enum_options_array",
        message: "input.enum() does not use options=[...] array. Pass enum values directly as defval. For string options, use input.string(options=[...]) instead.",
        severity: "error"
      });
    }

    // E014: strategy() without title
    if (state.enabledRules.has("E014_strategy_missing_title") && /\bstrategy\s*\(/.test(stripped)) {
      if (!/strategy\s*\(\s*["']/.test(stripped) && !/strategy\s*\([^)]*title\s*=/.test(stripped)) {
        issues.push({
          line: lineNum, rule: "E014_strategy_missing_title",
          message: 'strategy() requires a title parameter. Add title="Strategy Name" or pass it as the first argument.',
          severity: "error"
        });
      }
    }

    // E015: Mismatched quotes
    if (state.enabledRules.has("E015_mismatched_quotes")) {
      const singles = (stripped.match(/'/g) || []).length - (stripped.match(/\\'/g) || []).length;
      const doubles = (stripped.match(/"/g) || []).length - (stripped.match(/\\"/g) || []).length;
      if (singles % 2 !== 0 || doubles % 2 !== 0) {
        if (!stripped.startsWith("//")) {
          issues.push({
            line: lineNum, rule: "E015_mismatched_quotes",
            message: "Possible mismatched string quotes. Ensure all strings are properly closed.",
            severity: "error"
          });
        }
      }
    }

    // W003: lookahead_on
    if (state.enabledRules.has("W003_lookahead_on") && /lookahead\s*=\s*barmerge\.lookahead_on/.test(stripped)) {
      issues.push({
        line: lineNum, rule: "W003_lookahead_on",
        message: "barmerge.lookahead_on can cause future data leak. Use barmerge.lookahead_off unless you explicitly need historical HTF values with [1] offset.",
        severity: "warning"
      });
    }

    // W004: high max_bars_back
    if (state.enabledRules.has("W004_high_max_bars_back")) {
      const mbbMatch = stripped.match(/max_bars_back\s*[=:]\s*(\d+)/);
      if (mbbMatch && parseInt(mbbMatch[1]) >= 5000) {
        issues.push({
          line: lineNum, rule: "W004_high_max_bars_back",
          message: `max_bars_back=${mbbMatch[1]} is very high and may impact performance. Consider if you really need this many historical bars.`,
          severity: "warning"
        });
      }
    }

    // W005: Potentially unused var
    if (state.enabledRules.has("W005_potentially_unused_var")) {
      const varMatch = stripped.match(/^var\s+(?:int|float|bool|string|color|line|box|label|table)?\s*(\w+)\s*=/);
      if (varMatch) {
        const varName = varMatch[1];
        const count = (code.match(new RegExp("\\b" + varName + "\\b", "g")) || []).length;
        if (count === 1) {
          issues.push({
            line: lineNum, rule: "W005_potentially_unused_var",
            message: `Variable '${varName}' is declared but may be unused. Verify it's referenced elsewhere.`,
            severity: "warning"
          });
        }
      }
    }
  }

  // W001: Missing //@version=6
  if (state.enabledRules.has("W001_missing_version")) {
    let versionFound = false;
    for (const line of lines) {
      const s = line.trim();
      if (!s || (s.startsWith("//") && !s.startsWith("//@"))) continue;
      if (s.startsWith("//@version=")) versionFound = true;
      break;
    }
    if (!versionFound) {
      issues.unshift({
        line: 1, rule: "W001_missing_version",
        message: "Missing //@version=6 declaration. Add it as the first non-comment line.",
        severity: "warning"
      });
    }
  }

  return issues;
}

// ---------------------------------------------------------------------------
// Presets
// ---------------------------------------------------------------------------

const PRESETS = {
  clean: `//@version=6
indicator("My RSI Signal", overlay=true)

lengthInput = input.int(14, "RSI Length", minval=1)
overboughtInput = input.int(70, "Overbought", minval=50, maxval=100)
oversoldInput = input.int(30, "Oversold", minval=0, maxval=50)

rsiValue = ta.rsi(close, lengthInput)

plotshape(ta.crossover(rsiValue, oversoldInput), "Buy", shape.triangleup, location.belowbar, color.green)
plotshape(ta.crossunder(rsiValue, overboughtInput), "Sell", shape.triangledown, location.abovebar, color.red)`,

  v5_migration: `//@version=6
// Trying to use v5 syntax in v6...
study("My Indicator", overlay=true)

htfClose = security(syminfo.tickerid, "D", close)

rsiVal = ta.rsi(close, 14)
plot(rsiVal)`,

  hallucinated: `//@version=6
indicator("Bad Functions", overlay=true)

// These functions don't exist in Pine v6
val1 = ta.momentum(close, 14)
val2 = math.clamp(close, 0, 100)
val3 = str.trim("  hello  ")
val4 = array.flatten(myArray)

// This one is real
val5 = ta.rsi(close, 14)
plot(val5)`,

  strategy_bugs: `//@version=6
strategy(overlay=true, default_qty_type=strategy.percent_of_equity)

rsiVal = ta.rsi(close, 14)

if ta.crossover(rsiVal, 30)
    strategy.entry("Long", strategy.long)

if ta.crossunder(rsiVal, 70)
    strategy.close("Long")

// Bug: alertcondition doesn't work in strategies
alertcondition(ta.crossover(rsiVal, 30), "Buy Signal")`,

  input_enum: `//@version=6
indicator("Enum Pitfalls", overlay=true)

// Bug: shape.* are const string, not enum
shapeChoice = input.enum(shape.triangleup, "Shape", options=[shape.triangleup, shape.triangledown, shape.circle])

// Bug: format.currency doesn't exist
formatType = format.currency

val = ta.sma(close, 14)
plot(val)`,

  kitchen_sink: `//@version=5
// This script demonstrates ALL lint rules triggering

study("Kitchen Sink", overlay=true)

htfClose = security(syminfo.tickerid, "D", close, lookahead=barmerge.lookahead_on)
max_bars_back = 10000

float returnType(x) => x * 2

shapeInput = input.enum(shape.triangleup, "Shape")
optInput = input.enum(defval="a", options=["a", "b", "c"])

curFmt = format.currency

var float unusedVar = 0.0

fakeVal = ta.momentum(close, 14)

if close == na
    label.new(bar_index, high, "NA found')

strategy("Kitchen Sink Strat", overlay=true)
alertcondition(close > open, "Up Bar")`,
};

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------

function updateAll() {
  state.code = document.getElementById("editor").value;
  state.issues = lintPine(state.code);
  renderLineNumbers();
  renderResults();
  updateStatus();
  updatePrompt();
  document.getElementById("charCount").textContent = `${state.code.length} chars`;
}

function renderLineNumbers() {
  const lines = state.code.split("\n");
  const errorLines = new Set(state.issues.filter(i => i.severity === "error").map(i => i.line));
  const warnLines = new Set(state.issues.filter(i => i.severity === "warning").map(i => i.line));

  const html = lines.map((_, i) => {
    const n = i + 1;
    let cls = "";
    if (errorLines.has(n)) cls = "has-error";
    else if (warnLines.has(n)) cls = "has-warning";
    return `<span class="ln ${cls}">${n}</span>`;
  }).join("");

  document.getElementById("lineNumbers").innerHTML = html;
}

function renderResults() {
  const list = document.getElementById("resultsList");
  const errors = state.issues.filter(i => i.severity === "error");
  const warnings = state.issues.filter(i => i.severity === "warning");

  document.getElementById("errorCount").textContent = `${errors.length} error${errors.length !== 1 ? "s" : ""}`;
  document.getElementById("warningCount").textContent = `${warnings.length} warning${warnings.length !== 1 ? "s" : ""}`;

  if (state.issues.length === 0) {
    if (!state.code.trim()) {
      list.innerHTML = `<div class="no-issues"><div class="check" style="background:var(--bg);color:var(--text-muted);">?</div><span style="font-size:12px;">Paste Pine Script code or pick a preset</span></div>`;
    } else {
      list.innerHTML = `<div class="no-issues"><div class="check">&#10003;</div><span style="font-size:12px;">No issues found</span></div>`;
    }
    return;
  }

  list.innerHTML = state.issues.map((issue, idx) => `
    <div class="result-item" onclick="goToLine(${issue.line})" data-idx="${idx}">
      <div class="result-header">
        <div class="severity-icon ${issue.severity}">${issue.severity === "error" ? "E" : "W"}</div>
        <span class="rule-name">${issue.rule}</span>
        <span class="line-ref">L${issue.line}</span>
      </div>
      <div class="message">${escapeHtml(issue.message)}</div>
    </div>
  `).join("");
}

function updateStatus() {
  const badge = document.getElementById("statusBadge");
  const text = document.getElementById("statusText");
  const errors = state.issues.filter(i => i.severity === "error").length;
  const warnings = state.issues.filter(i => i.severity === "warning").length;

  if (!state.code.trim()) {
    badge.className = "status-badge ok";
    text.textContent = "No code";
  } else if (errors > 0) {
    badge.className = "status-badge issues";
    text.textContent = `${errors} error${errors !== 1 ? "s" : ""}, ${warnings} warning${warnings !== 1 ? "s" : ""}`;
  } else if (warnings > 0) {
    badge.className = "status-badge warnings";
    text.textContent = `${warnings} warning${warnings !== 1 ? "s" : ""}`;
  } else {
    badge.className = "status-badge ok";
    text.textContent = "All clear";
  }
}

function updatePrompt() {
  const el = document.getElementById("promptContent");
  if (!state.code.trim() || state.issues.length === 0) {
    el.textContent = "Write or paste Pine Script code to generate a fix prompt.";
    return;
  }

  const errors = state.issues.filter(i => i.severity === "error");
  const warnings = state.issues.filter(i => i.severity === "warning");
  const parts = [];

  parts.push("Fix the following issues in my Pine Script v6 code:\n");

  if (errors.length > 0) {
    parts.push("Errors:");
    errors.forEach(e => {
      parts.push(`  Line ${e.line}: ${e.message}`);
    });
    parts.push("");
  }

  if (warnings.length > 0) {
    parts.push("Warnings:");
    warnings.forEach(w => {
      parts.push(`  Line ${w.line}: ${w.message}`);
    });
    parts.push("");
  }

  // Add specific guidance based on rule types
  const ruleSet = new Set(state.issues.map(i => i.rule));
  if (ruleSet.has("E005_study_removed") || ruleSet.has("E006_security_removed")) {
    parts.push("This code appears to use Pine Script v5 syntax. Please migrate it to v6.");
  }
  if (ruleSet.has("E012_unknown_function")) {
    parts.push("Verify all function names against the Pine Script v6 reference before suggesting replacements.");
  }

  parts.push("\n```pine\n" + state.code + "\n```");

  el.textContent = parts.join("\n");
}

// ---------------------------------------------------------------------------
// Interactions
// ---------------------------------------------------------------------------

function loadPreset(name) {
  const code = PRESETS[name];
  if (!code) return;

  document.getElementById("editor").value = code;
  state.activePreset = name;

  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.classList.toggle("active", btn.textContent.toLowerCase().includes(name.replace(/_/g, " ").replace("v5 ", "v5")));
  });

  // Match by onclick attribute
  document.querySelectorAll(".preset-btn").forEach(btn => {
    const onclick = btn.getAttribute("onclick") || "";
    btn.classList.toggle("active", onclick.includes(`'${name}'`));
  });

  updateAll();
}

function goToLine(lineNum) {
  const editor = document.getElementById("editor");
  const lines = editor.value.split("\n");
  let pos = 0;
  for (let i = 0; i < lineNum - 1 && i < lines.length; i++) {
    pos += lines[i].length + 1;
  }
  editor.focus();
  editor.setSelectionRange(pos, pos + (lines[lineNum - 1] || "").length);
}

function togglePrompt() {
  state.promptExpanded = !state.promptExpanded;
  document.getElementById("promptContent").style.display = state.promptExpanded ? "block" : "none";
  document.getElementById("toggleBtn").textContent = state.promptExpanded ? "Collapse" : "Expand";
}

function copyPrompt() {
  const text = document.getElementById("promptContent").textContent;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById("copiedToast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1500);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ---------------------------------------------------------------------------
// Rule toggles
// ---------------------------------------------------------------------------

function renderRuleToggles() {
  const container = document.getElementById("ruleToggles");
  let html = '<h3>Rules</h3>';

  // Sort: errors first, then warnings, alphabetical within
  const sorted = Object.entries(RULES).sort((a, b) => {
    if (a[1].severity !== b[1].severity) return a[1].severity === "error" ? -1 : 1;
    return a[0].localeCompare(b[0]);
  });

  for (const [ruleId, rule] of sorted) {
    const shortId = ruleId.split("_")[0];
    const colorClass = rule.severity === "error" ? "error-rule" : "warning-rule";
    html += `
      <label class="rule-toggle">
        <input type="checkbox" checked onchange="toggleRule('${ruleId}', this.checked)">
        <span class="rule-id ${colorClass}">${shortId}</span>
        <span>${rule.desc}</span>
      </label>`;
  }

  container.innerHTML = html;
}

function toggleRule(ruleId, enabled) {
  if (enabled) {
    state.enabledRules.add(ruleId);
  } else {
    state.enabledRules.delete(ruleId);
  }
  updateAll();
}

// ---------------------------------------------------------------------------
// Sync scroll
// ---------------------------------------------------------------------------

function syncScroll() {
  const editor = document.getElementById("editor");
  const lineNums = document.getElementById("lineNumbers");
  lineNums.scrollTop = editor.scrollTop;
}

// ---------------------------------------------------------------------------
// Tab key support
// ---------------------------------------------------------------------------

function handleTab(e) {
  if (e.key === "Tab") {
    e.preventDefault();
    const editor = e.target;
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + "    " + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 4;
    updateAll();
  }
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

document.getElementById("editor").addEventListener("input", updateAll);
document.getElementById("editor").addEventListener("scroll", syncScroll);
document.getElementById("editor").addEventListener("keydown", handleTab);

renderRuleToggles();
updateAll();

// Auto-load a preset on start
loadPreset("v5_migration");
</script>
</body>
</html>
